syntax = "proto3";

package kvstore;

message PutRequest {
    string key = 1;
    string value = 2;
    uint64 timestamp = 3;
}

message PutResponse {
    bool success = 1;
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    bool found = 1;
    string value = 2;
    uint64 timestamp = 3;
}

message RemoveRequest {
    string key = 1;
}

message RemoveResponse {
    bool removed = 1;
}

// Stage 7: a trivial RPC used purely for liveness checking.
message PingRequest {}
message PingResponse {
    bool alive = 1;
}

service KVStoreService {
    rpc Put(PutRequest) returns (PutResponse);
    rpc Get(GetRequest) returns (GetResponse);
    rpc Remove(RemoveRequest) returns (RemoveResponse);
    rpc Ping(PingRequest) returns (PingResponse);
}