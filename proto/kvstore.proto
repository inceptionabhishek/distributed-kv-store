syntax = "proto3";

package kvstore;

message PutRequest {
    string key = 1;
    string value = 2;
    uint64 timestamp = 3;   // client-assigned write time, used for last-write-wins conflict resolution
}

message PutResponse {
    bool success = 1;
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    bool found = 1;
    string value = 2;
    uint64 timestamp = 3;   // lets the router compare answers from multiple replicas and pick the newest
}

message RemoveRequest {
    string key = 1;
}

message RemoveResponse {
    bool removed = 1;
}

service KVStoreService {
    rpc Put(PutRequest) returns (PutResponse);
    rpc Get(GetRequest) returns (GetResponse);
    rpc Remove(RemoveRequest) returns (RemoveResponse);
}